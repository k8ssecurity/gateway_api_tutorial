# =============================================================================
# Gateway Resource - Your Cloud Load Balancer Entry Point
# =============================================================================
#
# NETWORK ANALOGY: Think of this as configuring a hardware load balancer.
# - The Gateway is like an F5 or NetScaler virtual server
# - Listeners are like VIPs (Virtual IPs) with specific ports
# - Each listener accepts traffic and routes it based on HTTPRoutes
#
# PREREQUISITE: Create the TLS secret BEFORE applying this file:
#
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /tmp/tls.key -out /tmp/tls.crt \
#     -subj "/CN=*.local.dev" \
#     -addext "subjectAltName=DNS:*.local.dev,DNS:localhost"
#
#   kubectl create secret tls eg-tls-cert \
#     --cert=/tmp/tls.crt --key=/tmp/tls.key \
#     -n envoy-gateway-system
#
# =============================================================================

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg-gateway
  namespace: envoy-gateway-system   # Must be in the same namespace as Envoy Gateway
spec:
  gatewayClassName: eg              # References the GatewayClass (like selecting your LB vendor)
  listeners:
    # HTTP Listener - accepts unencrypted traffic on port 80
    # Similar to: virtual server 0.0.0.0:80 on a traditional load balancer
    - name: http
      protocol: HTTP
      port: 80
      # allowedRoutes controls WHICH namespaces may attach HTTPRoutes to this
      # listener. This is the route -> Gateway permission, and the *Gateway
      # owner* sets it (separate from the route -> Service permission, which the
      # Service owner sets via a ReferenceGrant — see 13-referencegrant-crossns.yaml).
      #
      # from: can be one of:
      #   Same     -> only routes in this Gateway's namespace (envoy-gateway-system).
      #               This is the Gateway API DEFAULT if allowedRoutes is omitted.
      #   All      -> routes from ANY namespace (used here so demo-app routes can attach).
      #   Selector -> only routes from namespaces matching a label selector.
      #
      # The lab uses `All` for simplicity. In production you'd usually tighten
      # this to `Selector` so only sanctioned namespaces can hang routes off a
      # shared gateway — least privilege, the same instinct as ReferenceGrant.
      # To do that, replace the two lines below with:
      #
      #   allowedRoutes:
      #     namespaces:
      #       from: Selector
      #       selector:
      #         matchLabels:
      #           gateway-access: "true"   # any label key/value you choose
      #
      # ...then label the namespaces you want to allow:
      #   kubectl label namespace demo-app gateway-access=true
      #
      allowedRoutes:
        namespaces:
          from: All                 # Accept routes from any namespace

    # HTTPS Listener - terminates TLS on port 443
    # Similar to: SSL offloading on a hardware load balancer
    - name: https
      protocol: HTTPS
      port: 443
      # Same as the http listener above — switch `from: All` to a `Selector`
      # to restrict which namespaces may attach routes here. See the comment on
      # the http listener for the full Selector example.
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate             # TLS termination (decrypt here, plain HTTP to backend)
        certificateRefs:
          - name: eg-tls-cert       # Reference to the TLS secret created above
            kind: Secret
